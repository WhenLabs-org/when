name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  action-bundle-up-to-date:
    # If someone touches action/ or src/ without rebuilding dist/action/index.js,
    # this job rebuilds it and fails the PR if the committed artifact differs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Check dist/action/index.js is up to date
        run: |
          if ! git diff --quiet -- dist/action/index.js; then
            echo "::error::dist/action/index.js is out of date."
            echo "Run 'npm run build' locally and commit the regenerated bundle."
            git diff --stat -- dist/action/index.js
            exit 1
          fi

# Runs `vow check --offline` on every pull request. Requires `policy.lock.json`
# to be committed (see `vow policy compile`) so no ANTHROPIC_API_KEY is needed.
# Uploads the markdown report as an artifact and posts it as a PR comment.

name: License check

on:
  pull_request:
    paths:
      - 'package-lock.json'
      - 'Cargo.lock'
      - 'poetry.lock'
      - '.vow.yml'
      - '.vow.json'
      - 'policy.lock.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  vow-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run vow check
        id: vow
        uses: whenlabs-org/vow@v1
        with:
          command: check
          offline: 'true'
          fail-on: block
          format: markdown
          output-file: vow-check.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vow-check-report
          path: vow-check.md

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('vow-check.md', 'utf-8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

# Diffs the current branch's dependency tree against the base branch and posts
# a summary comment to the PR. Flags license downgrades (e.g. MIT → GPL) and
# new copyleft deps introduced on the branch.

name: License diff

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  vow-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch (for baseline)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: head

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build baseline from base branch
        uses: whenlabs-org/vow@v1
        with:
          command: scan
          path: base
          format: json
          output-file: baseline.json

      - name: Diff head against baseline
        uses: whenlabs-org/vow@v1
        with:
          command: diff
          path: head
          baseline: baseline.json
          format: markdown
          fail-on: error
          output-file: diff.md

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('diff.md', 'utf-8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
